<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders & Notifications - Women's Health & Wellness</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-logo">Women's Health & Wellness</a>
                <div class="nav-menu">
                    <a href="index.html">Home</a>
                    <a href="features.html">Features</a>
                    <a href="nutrition.html">Nutrition</a>
                    <a href="reminders.html" class="active">Reminders</a>
                    <div class="nav-auth-guest" id="nav-guest">
                        <a href="login.html" class="btn-login">Login</a>
                        <a href="signup.html" class="btn-signup">Sign Up</a>
                    </div>
                    <div class="nav-auth-user" id="nav-user" style="display: none;">
                        <div class="profile-dropdown">
                            <button class="profile-btn" onclick="toggleProfileMenu()">Profile ▼</button>
                            <div class="profile-menu" id="profile-menu">
                                <a href="profile.html">View Profile</a>
                                <a href="#" onclick="doLogout()">Logout</a>
                            </div>
                        </div>
                    </div>
                    <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="reminders-page">
        <section class="hero">
            <h1>Reminders & Notifications</h1>
            <p>Set personalized reminders for medication, appointments, and self-care activities.</p>
        </section>

        <section class="add-reminder">
            <h2>Add New Reminder</h2>
            <form id="reminder-form">
                <div class="form-group">
                    <label for="reminder-type">Type:</label>
                    <select id="reminder-type" required>
                        <option value="medication">Medication</option>
                        <option value="appointment">Appointment</option>
                        <option value="self-care">Self-Care</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reminder-title">Title:</label>
                    <input type="text" id="reminder-title" required placeholder="e.g., Take vitamins">
                </div>
                <div class="form-group">
                    <label for="reminder-date">Date:</label>
                    <input type="date" id="reminder-date" required>
                </div>
                <div class="form-group">
                    <label for="reminder-time">Time:</label>
                    <input type="time" id="reminder-time" required>
                </div>
                <div class="form-group">
                    <label for="reminder-notes">Notes:</label>
                    <textarea id="reminder-notes" placeholder="Additional notes"></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Reminder</button>
            </form>
        </section>

        <section class="reminders-list">
            <h2>Your Reminders</h2>
            <div id="reminders-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Women's Health & Wellness. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
